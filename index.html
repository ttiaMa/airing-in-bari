<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Film in Programmazione a Bari</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 id="page-title">🎬 I Film in Programmazione a Bari</h2>
    <p class="subtitle">
      <i>* Gli orari vengono aggiornati alle 8:00 e alle 12:00</i>
    </p>

    <!-- Filters Section -->
    <div class="filters-container" id="filters-container" style="display: none;">
      <div class="filter-group">
        <label for="cinema-filter">Filtra per Cinema</label>
        <select id="cinema-filter">
          <option value="all">Tutti i cinema</option>
          <!-- Options verranno iniettate via JS -->
        </select>
      </div>
      
      <div class="filter-group">
        <label for="time-filter">Orario minimo</label>
        <select id="time-filter">
          <!-- opzioni generate via JS in formato 24h -->
        </select>
      </div>
    </div>

    <!-- Movies Container dove iniettiamo i risultati -->
    <div id="movies-container">
      <p class="loading-state">Caricamento film in corso...</p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p style="margin: 0 0 15px 0;">
        <a href="https://github.com/ttiaMa/airing-in-bari" target="_blank">
          <img src="https://img.shields.io/github/stars/ttiaMa/airing-in-bari?style=for-the-badge&logo=github&label=GitHub&color=181717&v=2" alt="GitHub Stars">
        </a>
      </p>
      <p style="margin: 0; font-family: monospace; color: #7f8c8d;">v2.1</p>
    </div>
  </div>

  <script>
    // --- 1. CONFIGURAZIONE E VARIABILI GLOBALI ---
    
    // Manteniamo una copia globale dei film scaricati 
    // per poter ri-renderizzare facilmente quando l'utente applica i filtri.
    let globalMoviesData = []; 

    // URL Personalizzati dei cinema
    const cinemaLinks = {
      "The Space Casamassima": "https://www.thespacecinema.it/cinema/casamassima/al-cinema",
      "Splendor": "https://www.cinemasplendor.eu/",
      "Abc": "https://www.facebook.com/Cinemabcbari/",
      "Uci Cinemas Showville": "https://ucicinemas.it/cinema/uci-cinemas-showville-bari",
      "Il Piccolo": "https://www.cinemapiccolo.it/",
      "Galleria": "https://www.multicinemagalleria.it/programmazione/"
    };

    // --- 2. FUNZIONI DI UTILITÀ ---

    // Genera il percorso del file JSON basato su una data specifica
    function getJsonPath(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `./data/${year}/${month}/${year}-${month}-${day}.json`;
    }

    // Compara due stringhe orario, formato "HH:mm". Ritorna true se timeA >= timeB
    function isTimeGreaterOrEqual(timeA, timeB) {
      // Se non abbiamo un filtro tempo, va sempre bene
      if (!timeB) return true;
      
      const [aHours, aMinutes] = timeA.split(':').map(Number);
      const [bHours, bMinutes] = timeB.split(':').map(Number);
      
      if (aHours > bHours) return true;
      if (aHours === bHours && aMinutes >= bMinutes) return true;
      
      return false;
    }

    // --- 3. FETCH E INIZIALIZZAZIONE ---

    async function initApp() {
      let currentDate = new Date();
      let data = null;
      let dateFound = null;
      let fetchError = false;

      // Prova a scaricare i dati di oggi, se fallisce prova ieri, e così via (max 3 tentativi)
      for (let i = 0; i < 3; i++) {
        const path = getJsonPath(currentDate);
        try {
          const response = await fetch(path);
          if (response.ok) {
            data = await response.json();
            dateFound = currentDate;
            break; // Abbiamo trovato i dati! Usciamo dal ciclo.
          }
        } catch (e) {
          console.log(`[Info] File ${path} non trovato o errore CORS. Passo al prossimo giorno...`, e);
          if (e instanceof TypeError) fetchError = true;
        }
        // Nessun dato per questa data, andiamo indietro di 24 ore
        currentDate.setDate(currentDate.getDate() - 1);
      }

      const container = document.getElementById('movies-container');

      if (!data) {
        if (window.location.protocol === 'file:' && fetchError) {
          container.innerHTML = `<p class="empty-state">Non riesco a caricare i dati.<br>Se stai aprendo il file direttamente dal PC, serve un server HTTP locale (es: <code>python -m http.server</code>).</p>`;
        } else {
          container.innerHTML = `<p class="empty-state">Nessun dato trovato per la programmazione attuale.</p>`;
        }
        return;
      }

      // 3.1 Aggiorna il titolo con la data corretta in cui abbiamo trovato i film
      const formattedDate = dateFound.toLocaleDateString('it-IT', { timeZone: 'Europe/Rome', day: '2-digit', month: '2-digit' });
      document.getElementById('page-title').innerHTML = `🎬 I Film in Programmazione a Bari - ${formattedDate}`;

      // 3.2 Salviamo i dati a livello globale e popoliamo i filtri
      globalMoviesData = data;
      populateCinemaFilter(data);
      populateTimeFilter();
      
      // Rendiamo visibili i filtri, in quanto abbiamo i dati
      document.getElementById('filters-container').style.display = 'flex';

      // 3.3 Renderizza i film per la prima volta (nessun filtro impostato)
      renderMovies();
    }

    // --- 4. LOGICA DEI FILTRI ---
    
    // Trova tutti i nomi dei cinema unici presenti nei film del giorno
    function populateCinemaFilter(movies) {
      const cinemaSelect = document.getElementById('cinema-filter');
      const uniqueCinemas = new Set();
      
      // Estraiamo tutti i cinema da tutti i film
      movies.forEach(movie => {
        if (movie.cinemas && Array.isArray(movie.cinemas)) {
          movie.cinemas.forEach(cinema => {
            if (cinema.name) {
              uniqueCinemas.add(cinema.name.trim());
            }
          });
        }
      });
      
      // Li stampiamo nel menu a tendina
      const sortedCinemas = Array.from(uniqueCinemas).sort();
      sortedCinemas.forEach(cinemaName => {
        const option = document.createElement('option');
        option.value = cinemaName;
        option.textContent = cinemaName;
        cinemaSelect.appendChild(option);
      });
      
      // Listener sul cinema — il tempo lo gestiamo nella propria funzione
      cinemaSelect.addEventListener('change', renderMovies);
    }

    // Popola il menu orario con ore in formato 24h (00:00 - 23:00)
    function populateTimeFilter() {
      const timeSelect = document.getElementById('time-filter');

      // Prima opzione: nessun filtro
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = 'Qualsiasi ora';
      timeSelect.appendChild(defaultOpt);

      // Generiamo le ore dalla sera (17 alle 23)
      for (let h = 17; h <= 23; h++) {
        const label = String(h).padStart(2, '0') + ':00';
        const opt = document.createElement('option');
        opt.value = label;
        opt.textContent = label;
        timeSelect.appendChild(opt);
      }

      timeSelect.addEventListener('change', renderMovies);
    }

    // --- 5. RENDERIZZAZIONE DELL'UI ---

    // Disegna la lista dei film basandosi sui dati globali e sui filtri attuali
    function renderMovies() {
      const container = document.getElementById('movies-container');
      
      // Leggiamo i valori correnti dai filtri inseriti dall'utente
      const selectedCinemaValue = document.getElementById('cinema-filter').value;
      const selectedTimeValue = document.getElementById('time-filter').value; // Es: "20:00"

      let htmlContent = '';
      let moviesRendered = 0;

      globalMoviesData.forEach(movie => {
        // Prepariamo l'array dei cinema che rispetti I FILTRI per questo preciso film
        let validCinemas = [];

        if (movie.cinemas && Array.isArray(movie.cinemas)) {
          movie.cinemas.forEach(cinema => {
            const cinemaName = cinema.name ? cinema.name.trim() : "";
            
            // 1) Filtro Cinema (saltiamo questo cinema se l'utente ne ha selezionato un altro)
            if (selectedCinemaValue !== 'all' && cinemaName !== selectedCinemaValue) {
              return; 
            }

            // 2) Filtro Orario (prendiamo solo gli orari >= a quello selezionato)
            let validTimesForCinema = [];
            
            // converti cinema.times (potrebbe essere stringa) in un array per sicurezza
            let timesArray = Array.isArray(cinema.times) ? cinema.times : cinema.times.split(",").map(t => t.trim());
            
            timesArray.forEach(timeString => {
              // Pulisce eventuale sporcizia dalla stringa (es: spazi superflui)
              const cleanTime = timeString.replace(/[^0-9:]/g, ''); 
              if (isTimeGreaterOrEqual(cleanTime, selectedTimeValue)) {
                validTimesForCinema.push(timeString);
              }
            });

            // Se questo cinema ha ancora orari disponibili dopo aver applicato il limite di tempo, 
            // creiamo un oggetto e lo conserviamo.
            if (validTimesForCinema.length > 0) {
              validCinemas.push({
                name: cinemaName,
                times: validTimesForCinema
              });
            }
          });
        }

        // Se dopo aver fatto il filtro questo film non ha ZERO cinema disponibili, allora possiamo mostrarlo
        if (validCinemas.length === 0) {
          return; // Salta al prossimo 'movie' senza aggiungerlo al codice HTML
        }

        moviesRendered++;

        // Risolviamo i vari dati del film per visualizzarli in UI
        const title = movie.tmdb_title || movie.original_title || "Titolo Sconosciuto";
        const searchTitle = movie.original_title || title;
        const letterboxdUrl = `https://letterboxd.com/search/films/${encodeURIComponent(searchTitle)}/`;
        const imdbUrl = `https://www.imdb.com/find/?q=${encodeURIComponent(searchTitle)}`;
        const genresText = Array.isArray(movie.genres) ? movie.genres.join(", ") : (movie.genres || 'N/D');
        const descText = movie.overview || movie.details || 'Nessuna descrizione disponibile.';

        // Generazione HTML interna per i Cinema restanti per questo Film
        let cinemasHtml = '';
        validCinemas.forEach(cinema => {
          const timesString = cinema.times.join(", ");
          const cinemaUrl = cinemaLinks[cinema.name] || "";
          
          const cinemaDisplayName = cinemaUrl 
            ? `<a href="${cinemaUrl}" target="_blank" class="cinema-link">${cinema.name}</a>` 
            : `<strong>${cinema.name}</strong>`;

          cinemasHtml += `<span class="cinema-item">• ${cinemaDisplayName}: ${timesString}</span>`;
        });

        // HTML del singolo movie-card (struttura a Flexbox div invece che table)
        htmlContent += `
          <div class="movie-card">
            <div class="movie-poster-container">
              <img src="${movie.poster_url || ''}" alt="${title}" class="movie-poster">
            </div>
            
            <div class="movie-info">
              <h3 class="movie-title">
                ${title.toUpperCase()}
                <a href="${letterboxdUrl}" target="_blank" title="Cerca su Letterboxd">
                  <img src="https://letterboxd.com/apple-touch-icon.png" class="movie-icon" alt="Letterboxd">
                </a>
                <a href="${imdbUrl}" target="_blank" title="Cerca su IMDb">
                  <img src="https://m.media-amazon.com/images/G/01/imdb/images-ANDW73HA/favicon_desktop_32x32._CB1582158068_.png" class="movie-icon" alt="IMDb">
                </a>
              </h3>
              
              <p class="movie-desc">"${descText}"</p>
              <p class="movie-meta"><strong>Regia:</strong> ${movie.director || 'N/D'}</p>
              <p class="movie-meta"><strong>Genere:</strong> ${genresText}</p>
              ${movie.cast ? `<p class="movie-meta"><strong>Cast:</strong> ${movie.cast}</p>` : ''}
              
              <div class="cinemas-box">
                <span class="cinemas-title">📍 Sale e Orari:</span>
                ${cinemasHtml}
              </div>
            </div>
          </div>
          <hr>
        `;
      });

      // Se non abbiamo stampato nemmeno un film (tutti fliltrati)
      if (moviesRendered === 0) {
        container.innerHTML = `<p class="empty-state">Nessun film trovato con i filtri correnti.</p>`;
      } else {
        container.innerHTML = htmlContent;
      }
    }

    // --- AVVIA L'APP ALLA PARTENZA ---
    
    // Non appena il browser ha caricato tutto il DOM (HTML), eseguiamo la funzione principale
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
